<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudySync Announcements</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

.announcements-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
margin-top:30px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#1f2937;
padding:25px;
border-radius:12px;
width:320px;
display:flex;
flex-direction:column;
gap:12px;
}

.modal-content textarea{
padding:10px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- GLOBAL APP -->
<script type="module" src="js/app.js"></script>

<div class="main">

<h1>Announcements 📢</h1>

<div id="announcementsContainer" class="announcements-grid"></div>

</div>

<!-- ADD BUTTON -->

<button id="addBtn" class="add-btn" onclick="openModal()" style="display:none">
+
</button>

<!-- MODAL -->

<div id="announcementModal" class="modal">

<div class="modal-content">

<h3>New Announcement</h3>

<textarea id="announcementText" placeholder="Write announcement..."></textarea>

<button class="btn" onclick="addAnnouncement()">Post</button>

</div>

</div>

<script>

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3
}
}
});

</script>

<script type="module">

import { db, auth } from "./js/firebase.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc,
getDoc,
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const container=document.getElementById("announcementsContainer");
const addBtn=document.getElementById("addBtn");

let role="";
let userEmail="";

/* AUTH */

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location="index.html";
return;
}

userEmail=user.email;

const userDoc=await getDoc(doc(db,"users",user.uid));

role=userDoc.data().role;

if(role==="teacher"){
addBtn.style.display="block";
}

loadAnnouncements();

});


/* LOAD */

async function loadAnnouncements(){

container.innerHTML="";

const q=query(collection(db,"announcements"),orderBy("date","desc"));

const snapshot=await getDocs(q);

snapshot.forEach(document=>{

const data=document.data();
const id=document.id;

container.innerHTML+=`

<div class="card">

<p>${data.text}</p>

<p style="opacity:0.7">
${new Date(data.date).toLocaleDateString()}
</p>

${
role==="teacher"
?
`<button class="btn" onclick="deleteAnnouncement('${id}')">Delete</button>`
:
""
}

</div>

`;

});

}


/* ADD */

window.addAnnouncement = async function(){

const text=document.getElementById("announcementText").value;

if(!text){
alert("Write announcement");
return;
}

await addDoc(collection(db,"announcements"),{

text,
postedBy:userEmail,
date:new Date().toISOString()

});

closeModal();

loadAnnouncements();

};


/* DELETE */

window.deleteAnnouncement = async function(id){

if(confirm("Delete announcement?")){

await deleteDoc(doc(db,"announcements",id));

loadAnnouncements();

}

};

</script>

<script>

function openModal(){
document.getElementById("announcementModal").style.display="flex";
}

function closeModal(){
document.getElementById("announcementModal").style.display="none";
}

</script>

</body>
</html>
