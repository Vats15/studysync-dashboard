<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudySync Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

/* GRID */

.dashboard-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:25px;
margin-top:20px;
}

/* CARDS */

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
border-radius:18px;
padding:22px;
box-shadow:0 15px 35px rgba(0,0,0,0.35);
transition:all .25s;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 20px 45px rgba(0,0,0,0.45);
}

.card h3{
margin-bottom:15px;
font-weight:600;
}

/* RIGHT PANEL */

.right-panel{
display:flex;
flex-direction:column;
gap:20px;
}

/* ANNOUNCEMENTS */

.announcement{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
padding:12px;
border-radius:10px;
margin-bottom:10px;
font-size:14px;
}

/* TIMETABLE */

.timetable-item{
display:flex;
justify-content:space-between;
padding:10px 12px;
border-radius:10px;
background:rgba(255,255,255,0.08);
margin-bottom:8px;
font-size:14px;
}

/* ATTENDANCE */

.attendance-box{
text-align:center;
font-size:42px;
font-weight:700;
background:linear-gradient(135deg,#22c55e,#4ade80);
padding:15px;
border-radius:12px;
}

/* CALENDAR */

#calendar{
height:420px;
}

/* GRAPHS */

.graph-grid{
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

/* CHART CONTAINER */

.chart-box{
background:linear-gradient(135deg,#6366f1,#3b82f6);
border-radius:16px;
padding:15px;
}

</style>

</head>

<body>
<div id="particles-js"></div>
<a href="chat.html" class="chat-float">💬</a>
<div id="sidebar" class="sidebar"></div>
<script type="module" src="js/app.js"></script>


<div class="main">

<h1>Dashboard 📊</h1>

<div class="dashboard-grid">

<!-- CALENDAR -->

<div class="card">

<h3>📅 Deadlines Calendar</h3>
<div id="calendar"></div>

</div>

<!-- RIGHT PANEL -->

<div class="right-panel">

<div class="card">

<h3>📢 Latest Announcements</h3>
<div id="announcementsBox"></div>

</div>

<div class="card">

<h3>🕒 Today's Classes</h3>
<div id="todayClasses"></div>

</div>

<div class="card">

<h3>📈 Overall Attendance</h3>
<div class="attendance-box" id="attendancePercent">0%</div>

</div>

</div>

</div>

<!-- GRAPHS -->

<div class="graph-grid">

<div class="card chart-box">

<h3>Attendance Trend</h3>
<canvas id="trendChart"></canvas>

</div>

<div class="card chart-box">

<h3>Subject Attendance</h3>
<canvas id="subjectChart"></canvas>

</div>

</div>

</div>

<script>

particlesJS("particles-js",{
particles:{
number:{value:70},
size:{value:3},
move:{speed:1.2},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.25
}
}
});

</script>

<script type="module">

import { db, auth } from "./js/firebase.js";

import {
collection,
getDocs,
query,
orderBy,
where,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location="index.html";
return;
}

loadCalendar();
loadAnnouncements();
loadTimetable();
loadAttendance(user.uid);

});

/* ================= CALENDAR ================= */

async function loadCalendar(){

const snapshot=await getDocs(collection(db,"deadlines"));

const events=[];

snapshot.forEach(doc=>{
const data=doc.data();
events.push({
title:data.title+" ("+data.subject+")",
date:data.dueDate
});
});

const calendar=new FullCalendar.Calendar(
document.getElementById("calendar"),
{
initialView:"dayGridMonth",
timeZone:"Asia/Kolkata",
events:events
}
);

calendar.render();
}

/* ================= ANNOUNCEMENTS ================= */

async function loadAnnouncements(){

const container=document.getElementById("announcementsBox");
container.innerHTML="";

const q=query(collection(db,"announcements"),orderBy("date","desc"));
const snapshot=await getDocs(q);

let count=0;

snapshot.forEach(doc=>{
if(count>=2) return;

const data=doc.data();

container.innerHTML+=`
<div class="announcement">${data.text}</div>
`;

count++;
});
}

/* ================= TIMETABLE ================= */

function loadTimetable(){

const day=new Date().toLocaleDateString("en-IN",{weekday:"long"});

const timetable = {
Monday:[
{time:"11-12",subject:"RFA"},
{time:"1-2",subject:"OFC"},
{time:"2-3",subject:"WC"},
{time:"3-4",subject:"CC"}
],
Tuesday:[
{time:"11-12",subject:"OFC"},
{time:"12-1",subject:"WC"},
{time:"2-3",subject:"CC"},
{time:"3-4",subject:"RFA Lab"}
],
Wednesday:[
{time:"2-3",subject:"WC Lab"},
{time:"3-4",subject:"RFA"}
],
Thursday:[
{time:"11-12",subject:"RFA"},
{time:"12-1",subject:"WC"},
{time:"2-3",subject:"CC"},
{time:"3-4",subject:"CC Lab"}
],
Friday:[
{time:"11-1",subject:"OFC Lab"},
{time:"2-3",subject:"OFC"},
{time:"3-5",subject:"Project Lab"}
]
};

const container=document.getElementById("todayClasses");
container.innerHTML="";

if(timetable[day]){
timetable[day].forEach(c=>{
container.innerHTML+=`
<div class="timetable-item">
<span>${c.subject}</span>
<span>${c.time}</span>
</div>
`;
});
}else{
container.innerHTML="<p>No classes today</p>";
}
}

/* ================= ATTENDANCE (MONTHLY TREND FIX) ================= */

function loadAttendance(userId){

const q = query(
collection(db,"attendanceRecords"),
where("student","==",userId)
);

onSnapshot(q,(snapshot)=>{

console.log("Docs:", snapshot.size);

/* DATA */
let total = 0;
const subjects = {};
const monthlyPresent = {};   // { Jan: count }

/* PRESENT DATA */
snapshot.forEach(doc=>{
const data = doc.data();
total++;

const d = data.date 
  ? new Date(data.date) 
  : (data.time ? new Date(data.time) : null);
if(!d) return;
const month = d.toLocaleString("default",{month:"short"});

/* SUBJECT BAR */
const subject = data.subject || "General";
subjects[subject] = (subjects[subject] || 0) + 1;

/* MONTHLY PRESENT */
if(!monthlyPresent[month]) monthlyPresent[month] = 0;
monthlyPresent[month] += 1;
});

/* ================= TOTAL SESSIONS ================= */

const sessionQuery = query(
collection(db,"attendanceSessions"),
where("active","==",false)
);

getDocs(sessionQuery).then(sessionSnap=>{

const monthlyTotal = {};   // { Jan: total }

/* TOTAL SESSIONS PER MONTH */
sessionSnap.forEach(doc=>{
const data = doc.data();

const d = data.date 
  ? new Date(data.date) 
  : (data.time ? new Date(data.time) : null);

if(!d || isNaN(d)) return;

const month = d.toLocaleString("default",{month:"short"});

if(!monthlyTotal[month]) monthlyTotal[month] = 0;
monthlyTotal[month] += 1;
});

/* ================= % CALCULATION ================= */

const labels = Array.from(
  new Set([
    ...Object.keys(monthlyTotal),
    ...Object.keys(monthlyPresent)
  ])
).filter(m => m !== "Invalid Date")
.sort((a,b)=>{
  const order = ["Jan","Feb","Mar","Apr","May"];
  return order.indexOf(a) - order.indexOf(b);
});

const dataPoints = labels.map(month=>{
const present = monthlyPresent[month] || 0;
const total = monthlyTotal[month] || 0;

return total > 0 ? Math.round((present / total) * 100) : 0;
});

/* ================= OVERALL % ================= */

const totalSessions = sessionSnap.size;
const attended = snapshot.size;

const percent = totalSessions > 0
? Math.round((attended / totalSessions) * 100)
: 0;

document.getElementById("attendancePercent").innerText = percent + "%";

/* ================= SUBJECT BAR ================= */

const subjectLabels = Object.keys(subjects).length ? Object.keys(subjects) : ["No Data"];
const subjectData = Object.values(subjects).length ? Object.values(subjects) : [0];

/* SAFE DESTROY */
if(window.trendChart && typeof window.trendChart.destroy === "function"){
window.trendChart.destroy();
}

if(window.subjectChart && typeof window.subjectChart.destroy === "function"){
window.subjectChart.destroy();
}

/* CONTEXT */
const trendCtx = document.getElementById("trendChart").getContext("2d");
const subjectCtx = document.getElementById("subjectChart").getContext("2d");

/* ================= LINE CHART (MONTHLY %) ================= */

window.trendChart = new Chart(trendCtx,{
type:"line",
data:{
labels: labels.length ? labels : ["No Data"],
datasets:[{
label:"Attendance %",
data: dataPoints,
borderColor:"#22c55e",
backgroundColor:"rgba(34,197,94,0.2)",
fill:true,
tension:0.4,
pointRadius:5
}]
},
options:{
responsive:true,
plugins:{
legend:{
labels:{
color:"#ffffff",
font:{size:14, weight:"bold"}
}
}
},
scales:{
y:{
beginAtZero:true,
max:100,
ticks:{
color:"#e5e7eb",
callback:(v)=> v + "%"
},
grid:{color:"rgba(255,255,255,0.08)"}
},
x:{
ticks:{color:"#e5e7eb"},
grid:{display:false}
}
}
}
});

/* ================= BAR CHART ================= */

window.subjectChart = new Chart(subjectCtx,{
type:"bar",
data:{
labels: subjectLabels,
datasets:[{
label:"Subjects",
data: subjectData,
backgroundColor:[
"#818cf8",
"#c084fc",
"#34d399",
"#fbbf24",
"#38bdf8",
"#fb7185"
],
borderRadius:10,
borderSkipped:false
}]
},
options:{
responsive:true,
plugins:{
legend:{
labels:{
color:"#ffffff",
font:{size:14, weight:"bold"}
}
}
},
scales:{
y:{
beginAtZero:true,
ticks:{
color:"#e5e7eb",
stepSize:1
},
grid:{color:"rgba(255,255,255,0.08)"}
},
x:{
ticks:{color:"#e5e7eb"},
grid:{display:false}
}
}
}
});

});

});
}
</script>
</body>
</html>
