<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mark Attendance</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div id="particles-js"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<script type="module" src="js/app.js"></script>

<div class="main">

<h1>Mark Attendance 📷</h1>

<div class="card">

<p>Choose attendance method</p>

<button class="btn" onclick="markSelf()">Mark Present</button>

<button class="btn" onclick="startScanner()">Scan QR</button>

<div id="qr-reader" style="margin-top:20px"></div>

<p id="statusMessage" style="margin-top:15px"></p>

</div>

</div>

<script>

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3
}
}
});

</script>

<script type="module">

import { auth, db } from "./js/firebase.js";

import {
doc,
getDoc,
setDoc,
updateDoc,
collection,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

let userId="";
let scanner=null;

/* =====================
AUTH CHECK
===================== */

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location="index.html";
return;
}

userId=user.uid;

});


/* =====================
SELF ATTENDANCE
===================== */

window.markSelf = async function(){

const q=query(
collection(db,"attendanceSessions"),
where("active","==",true),
where("mode","==","self")
);

const snap=await getDocs(q);

if(snap.empty){

document.getElementById("statusMessage").innerText=
"No self attendance session running";

return;

}

snap.forEach(async session=>{

const sessionId=session.id;
const data=session.data();

const recordId=userId+"_"+sessionId;

const recordRef=doc(db,"attendanceRecords",recordId);

const record=await getDoc(recordRef);

if(record.exists()){

document.getElementById("statusMessage").innerText=
"Attendance already marked";

return;

}

await setDoc(recordRef,{
student:userId,
session:sessionId,
time:new Date().toISOString()
});

await updateDoc(doc(db,"attendanceSessions",sessionId),{
present:data.present+1
});

document.getElementById("statusMessage").innerText=
"Attendance marked successfully";

});

};


/* =====================
QR SCANNER
===================== */

window.startScanner = function(){

if(scanner){
scanner.stop();
}

scanner = new Html5Qrcode("qr-reader");

scanner.start(

{ facingMode:"environment" },

{ fps:10, qrbox:250 },

async(decodedText)=>{

try{

const sessionRef=doc(db,"attendanceSessions",decodedText);

const session=await getDoc(sessionRef);

if(!session.exists()){

document.getElementById("statusMessage").innerText=
"Invalid QR session";

return;

}

const data=session.data();

if(!data.active){

document.getElementById("statusMessage").innerText=
"Attendance session closed";

return;

}

const recordId=userId+"_"+decodedText;

const recordRef=doc(db,"attendanceRecords",recordId);

const record=await getDoc(recordRef);

if(record.exists()){

document.getElementById("statusMessage").innerText=
"Attendance already marked";

return;

}

await setDoc(recordRef,{
student:userId,
session:decodedText,
time:new Date().toISOString()
});

await updateDoc(sessionRef,{
present:data.present+1
});

document.getElementById("statusMessage").innerText=
"Attendance marked successfully";

scanner.stop();

}catch(err){

console.error(err);

document.getElementById("statusMessage").innerText=
"Error marking attendance";

}

}

);

};

</script>

</body>
</html>
