<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mark Attendance</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

/* CENTER */
.main{
display:flex;
flex-direction:column;
align-items:center;
}

/* CARD */
.card{
max-width:420px;
width:100%;
text-align:center;
}

/* BUTTON */
.btn{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
border:none;
padding:12px;
border-radius:10px;
color:white;
cursor:pointer;
width:100%;
margin-top:15px;
font-size:16px;
}

/* STATUS */
#statusMessage{
margin-top:15px;
font-size:14px;
opacity:0.9;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<script type="module" src="js/app.js"></script>

<div class="main">

<h1>Mark Attendance ✅</h1>

<div class="card">

<p>Click below to mark your attendance</p>

<button class="btn" onclick="markSelf()">Mark Present</button>

<p id="statusMessage"></p>

</div>

</div>

<script>

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3
}
}
});

</script>

<script type="module">

import { auth, db } from "./js/firebase.js";

import {
doc,
getDoc,
setDoc,
updateDoc,
collection,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

let userId = "";

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(!user){
window.location="index.html";
return;
}
userId = user.uid;
});

/* SELF ATTENDANCE */
window.markSelf = async function(){

const status = document.getElementById("statusMessage");
status.innerText = "Checking session...";

try{

const q = query(
collection(db,"attendanceSessions"),
where("active","==",true),
where("mode","==","self")
);

const snap = await getDocs(q);

if(snap.empty){
status.innerText = "No active session ❌";
return;
}

let marked = false;
let alreadyMarkedAll = true;

for(const session of snap.docs){

const sessionId = session.id;
const data = session.data();

const recordId = userId + "_" + sessionId;
const recordRef = doc(db,"attendanceRecords",recordId);

const record = await getDoc(recordRef);

/* NOT MARKED YET */
if(!record.exists()){

alreadyMarkedAll = false;

/* SAVE */
await setDoc(recordRef,{
student:userId,
session:sessionId,
subject:data.subject,
time:new Date().toISOString()
});

/* UPDATE COUNT */
await updateDoc(doc(db,"attendanceSessions",sessionId),{
present:(data.present || 0) + 1
});

status.innerText = "Attendance marked ✅";
navigator.vibrate?.(200);

marked = true;
break;
}

}

/* ALL MARKED */
if(!marked && alreadyMarkedAll){
status.innerText = "Already marked ⚠️";
return;
}

/* FALLBACK */
if(!marked){
status.innerText = "Error ❌";
}

}catch(err){
console.error(err);
status.innerText = err.message;
}

};

</script>

</body>
</html>
