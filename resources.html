<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Resources</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

.upload-bar{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:25px;
}

.upload-bar input{
flex:1;
min-width:180px;
}

.resource-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- GLOBAL APP -->
<script type="module" src="js/app.js"></script>

<div class="main">

<h1>My Resources 📂</h1>

<!-- Upload -->

<div class="upload-bar">

<input id="title" placeholder="Resource title">

<input id="driveLink" placeholder="Google Drive / PDF link">

<input id="shareEmail" placeholder="Share with emails (comma separated)">

<button class="btn" onclick="uploadResource()">Upload</button>

</div>

<div id="resourceContainer" class="resource-grid"></div>

</div>

<script>

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3
}
}
});

</script>

<script type="module">

import { db, auth } from "./js/firebase.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const container=document.getElementById("resourceContainer");

let userEmail="";
let role="";

/* AUTH */

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location="index.html";
return;
}

userEmail=user.email;

const userDoc=await getDoc(doc(db,"users",user.uid));

role=userDoc.data().role;

/* teachers cannot access resources */

if(role==="teacher"){
window.location="attendance.html";
return;
}

loadResources();

});


/* LOAD RESOURCES */

async function loadResources(){

container.innerHTML="";

const snapshot=await getDocs(collection(db,"resources"));

snapshot.forEach(document=>{

const data=document.data();
const id=document.id;

const shared=data.sharedWith || [];

if(
data.uploadedBy===userEmail ||
shared.includes(userEmail)
){

container.innerHTML+=`

<div class="card">

<h3>${data.title}</h3>

<p style="opacity:0.7">
Shared by ${data.uploadedBy}
</p>

<button class="btn"
onclick="window.open('${data.link}')">
Open
</button>

${
data.uploadedBy===userEmail
?
`<button class="btn" onclick="deleteResource('${id}')">
Delete
</button>`
:
""
}

</div>

`;

}

});

}


/* UPLOAD RESOURCE */

window.uploadResource = async function(){

const title=document.getElementById("title").value;
const link=document.getElementById("driveLink").value;
const share=document.getElementById("shareEmail").value;

if(!title || !link){
alert("Add title and link");
return;
}

const shareList = share
? share.split(",").map(e=>e.trim())
: [];

await addDoc(collection(db,"resources"),{

title:title,
link:link,
uploadedBy:userEmail,
sharedWith:shareList,
date:new Date().toISOString()

});

document.getElementById("title").value="";
document.getElementById("driveLink").value="";
document.getElementById("shareEmail").value="";

loadResources();

};


/* DELETE */

window.deleteResource = async function(id){

if(confirm("Delete resource?")){

await deleteDoc(doc(db,"resources",id));

loadResources();

}

};

</script>

</body>
</html>
