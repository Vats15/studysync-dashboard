<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Panel</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

/* CENTER PAGE */
.center-page{
display:flex;
flex-direction:column;
align-items:center;
}

/* PANEL */
.panel{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(16px);
border-radius:18px;
padding:25px;
max-width:420px;
width:100%;
display:flex;
flex-direction:column;
gap:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

/* INPUTS */
.panel input,
.panel select{
width:100%;
padding:10px;
border-radius:10px;
border:none;
}

/* BUTTONS */
.buttons{
display:flex;
gap:10px;
}

.buttons button{
flex:1;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
border:none;
padding:10px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* COUNT */
.count{
text-align:center;
font-size:18px;
font-weight:600;
}

/* PROGRESS */
.progress{
background:rgba(255,255,255,0.2);
height:10px;
border-radius:10px;
overflow:hidden;
}

.progress-bar{
background:linear-gradient(90deg,#22c55e,#4ade80);
height:100%;
width:0%;
transition:0.3s;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>
<a href="chat.html" class="chat-float">💬</a>

<script type="module" src="js/app.js"></script>

<div class="main center-page">

<h1 style="margin-bottom:20px;">Teacher Panel 👩‍🏫</h1>

<div class="panel">

<h3>Start Attendance</h3>

<select id="subject">
<option value="RFA">RFA</option>
<option value="RFA Lab">RFA Lab</option>
<option value="OFC">OFC</option>
<option value="OFC Lab">OFC Lab</option>
<option value="WC">Wireless Communication</option>
<option value="WC Lab">Wireless Communication Lab</option>
<option value="CC">Cloud Computing</option>
<option value="CC Lab">Cloud Computing Lab</option>
</select>

<input id="totalStudents" placeholder="Total Students">

<p style="font-size:13px; opacity:0.8;">
Mode: Self Attendance Only
</p>

<div class="buttons">
<button onclick="startSession()">Start</button>
<button onclick="endSession()">End</button>
</div>

<div class="count">
Present: <span id="presentCount">0</span>
</div>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

</div>

</div>

<script type="module">

import { db } from "./js/firebase.js";

import {
collection,
addDoc,
updateDoc,
doc,
onSnapshot,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

let sessionId = null;
let unsubscribe = null;

/* ================= START SESSION ================= */
window.startSession = async function(){

if(sessionId){
alert("Session already running");
return;
}

const subject = document.getElementById("subject").value;
const totalStudents = Number(document.getElementById("totalStudents").value);

if(!totalStudents){
alert("Enter total students");
return;
}

/* 🔥 CLOSE OLD SESSIONS (VERY IMPORTANT) */
const oldSessions = await getDocs(
query(collection(db,"attendanceSessions"), where("active","==",true))
);

oldSessions.forEach(async(s)=>{
await updateDoc(doc(db,"attendanceSessions",s.id),{
active:false
});
});

/* CREATE NEW SESSION */
const ref = await addDoc(collection(db,"attendanceSessions"),{
subject,
total: totalStudents,
present: 0,
active: true,
mode: "self",
date: new Date().toISOString()
});

sessionId = ref.id;

/* RESET UI */
document.getElementById("presentCount").innerText = "0";
document.getElementById("progressBar").style.width = "0%";

/* LISTEN ONLY THIS SESSION */
listenAttendance();
};

/* ================= END SESSION ================= */
window.endSession = async function(){

if(!sessionId){
alert("No session running");
return;
}

await updateDoc(doc(db,"attendanceSessions",sessionId),{
active:false
});

sessionId = null;

/* RESET UI */
document.getElementById("presentCount").innerText="0";
document.getElementById("progressBar").style.width="0%";

if(unsubscribe){
unsubscribe();
unsubscribe=null;
}

alert("Attendance session ended");
};

/* ================= LIVE UPDATE (FIXED) ================= */
function listenAttendance(){

if(!sessionId) return;

/* 🔥 LISTEN ONLY CURRENT SESSION */
const ref = doc(db,"attendanceSessions",sessionId);

if(unsubscribe) unsubscribe();

unsubscribe = onSnapshot(ref,(snap)=>{

if(!snap.exists()) return;

const data = snap.data();

/* SAFE UPDATE */
const present = data.present || 0;
const total = data.total || 0;

document.getElementById("presentCount").innerText = present;

/* PROGRESS */
if(total > 0){
const percent = (present / total) * 100;
document.getElementById("progressBar").style.width = percent + "%";
}

});
}

</script>

<script>
particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3
}
}
});
</script>

</body>
</html>
