<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudySync Deadlines</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

.deadline-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
margin-top:30px;
}

.add-btn{
position:fixed;
bottom:30px;
right:40px;
background:#6366f1;
color:white;
border:none;
width:60px;
height:60px;
border-radius:50%;
font-size:30px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#1f2937;
padding:25px;
border-radius:12px;
width:320px;
display:flex;
flex-direction:column;
gap:12px;
}

.modal-content input{
padding:10px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- GLOBAL APP -->
<script type="module" src="js/app.js"></script>

<div class="main">

<h1>Deadlines ⏰</h1>

<div id="deadlineContainer" class="deadline-grid"></div>

</div>

<!-- ADD BUTTON -->

<button id="addBtn" class="add-btn" onclick="openModal()" style="display:none">
+
</button>

<!-- MODAL -->

<div id="deadlineModal" class="modal">

<div class="modal-content">

<h3>Add Deadline</h3>

<input id="title" placeholder="Assignment title">

<input id="subject" placeholder="Subject">

<input id="dueDate" type="date">

<button class="btn" onclick="addDeadline()">Save</button>

</div>

</div>

<script>

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3
}
}
});

</script>

<script type="module">

import { db, auth } from "./js/firebase.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const container=document.getElementById("deadlineContainer");
const addBtn=document.getElementById("addBtn");

let role="";
let userEmail="";

/* AUTH */

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location="index.html";
return;
}

userEmail=user.email;

const userDoc=await getDoc(doc(db,"users",user.uid));

role=userDoc.data().role;

if(role==="teacher"){
addBtn.style.display="block";
}

loadDeadlines();

});


/* LOAD DEADLINES */

async function loadDeadlines(){

container.innerHTML="";

const snapshot=await getDocs(collection(db,"deadlines"));

const today=new Date();
today.setHours(0,0,0,0);

snapshot.forEach(document=>{

const data=document.data();
const id=document.id;

const date=new Date(data.dueDate);

if(date < today) return;

container.innerHTML+=`

<div class="card">

<h3>${data.title}</h3>

<p>${data.subject}</p>

<p style="opacity:0.7">
Due: ${date.toLocaleDateString("en-IN")}
</p>

${
role==="teacher"
?
`<button class="btn" onclick="deleteDeadline('${id}')">Delete</button>`
:
""
}

</div>

`;

});

}


/* ADD DEADLINE */

window.addDeadline = async function(){

const title=document.getElementById("title").value;
const subject=document.getElementById("subject").value;
const dueDate=document.getElementById("dueDate").value;

if(!title || !subject || !dueDate){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"deadlines"),{

title:title,
subject:subject,
dueDate:dueDate,
createdBy:userEmail,
createdAt:new Date().toISOString()

});

closeModal();

loadDeadlines();

};


/* DELETE DEADLINE */

window.deleteDeadline = async function(id){

if(confirm("Delete deadline?")){

await deleteDoc(doc(db,"deadlines",id));

loadDeadlines();

}

};

</script>

<script>

function openModal(){
document.getElementById("deadlineModal").style.display="flex";
}

function closeModal(){
document.getElementById("deadlineModal").style.display="none";
}

</script>

</body>
</html>
