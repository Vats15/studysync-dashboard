<!DOCTYPE html>
<html>

<head>

<title>StudySync Login</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:linear-gradient(135deg,#6366f1,#3b82f6,#8b5cf6);
font-family:Poppins;
margin:0;
}

.login-card{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:14px;
backdrop-filter:blur(10px);
width:340px;
display:flex;
flex-direction:column;
gap:12px;
color:white;
}

.login-card input,
.login-card select{
padding:10px;
border:none;
border-radius:8px;
}

.login-card button{
padding:10px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
}

.switch{
text-align:center;
cursor:pointer;
opacity:0.8;
}

.error{
color:#ffb4b4;
font-size:13px;
}

</style>

</head>

<body>

<div class="login-card">

<h2>StudySync Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<select id="role">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
</select>

<button id="loginBtn">Login</button>

<div class="switch" id="signupBtn">Create Account</div>

<div id="errorMsg" class="error"></div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";

import {
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const emailInput=document.getElementById("email");
const passInput=document.getElementById("password");
const roleInput=document.getElementById("role");
const errorBox=document.getElementById("errorMsg");

/* =========================
AUTO LOGIN REDIRECT
========================= */

onAuthStateChanged(auth, async(user)=>{

if(!user) return;

const userDoc = await getDoc(doc(db,"users",user.uid));

if(!userDoc.exists()) return;

const role=userDoc.data().role;

if(role==="teacher"){
window.location="attendance.html";
}else{
window.location="dashboard.html";
}

});


/* =========================
SIGNUP
========================= */

document.getElementById("signupBtn").onclick = async ()=>{

errorBox.innerText="";

const email=emailInput.value.trim();
const password=passInput.value.trim();
const role=roleInput.value;

if(!email || !password){
errorBox.innerText="Please fill all fields";
return;
}

try{

const userCredential = await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",userCredential.user.uid),{
email:email,
role:role
});

alert("Account created successfully! Please login.");

}catch(err){

errorBox.innerText=err.message;

}

};


/* =========================
LOGIN
========================= */

document.getElementById("loginBtn").onclick = async ()=>{

errorBox.innerText="";

const email=emailInput.value.trim();
const password=passInput.value.trim();

if(!email || !password){
errorBox.innerText="Enter email and password";
return;
}

try{

const userCredential = await signInWithEmailAndPassword(auth,email,password);

const userDoc = await getDoc(doc(db,"users",userCredential.user.uid));

if(!userDoc.exists()){
errorBox.innerText="User role not found";
return;
}

const role=userDoc.data().role;

if(role==="teacher"){
window.location="attendance.html";
}else{
window.location="dashboard.html";
}

}catch(err){

errorBox.innerText=err.message;

}

};

</script>

</body>
</html>
