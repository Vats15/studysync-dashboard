<!DOCTYPE html>
<html>

<head>
<title>StudySync Login</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:linear-gradient(135deg,#6366f1,#3b82f6,#8b5cf6);
font-family:Poppins;
margin:0;
}

.login-card{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:14px;
backdrop-filter:blur(10px);
width:340px;
display:flex;
flex-direction:column;
gap:12px;
color:white;
}

.login-card input,
.login-card select{
padding:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
}

.login-card input::placeholder{
color:rgba(255,255,255,0.7);
}

.login-card button{
padding:10px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
transition:0.2s;
}

.login-card button:hover{
background:#4f46e5;
}

.switch{
text-align:center;
cursor:pointer;
opacity:0.8;
}

.error{
color:#ffb4b4;
font-size:13px;
}
</style>

</head>

<body>

<div class="login-card">

<h2>StudySync Login</h2>

<input id="name" placeholder="Full Name (for signup only)">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<select id="role">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
</select>

<button id="loginBtn">Login</button>
<div class="switch" id="forgotBtn">Forgot Password?</div>
<div class="switch" id="signupBtn">Create Account</div>

<div id="errorMsg" class="error"></div>

</div>

<script type="module">

import { auth, db } from "./js/firebase.js";

import {
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
sendPasswordResetEmail,
signOut
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

import {
doc,
setDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const passInput = document.getElementById("password");
const roleInput = document.getElementById("role");
const errorBox = document.getElementById("errorMsg");


/* =========================
AUTO LOGIN REDIRECT
========================= */
onAuthStateChanged(auth, async(user)=>{

if(!user) return;

const userDoc = await getDoc(doc(db,"users",user.uid));

if(!userDoc.exists()) return;

const role = userDoc.data().role;

if(role==="teacher"){
window.location="attendance.html";
}else{
window.location="dashboard.html";
}

});


/* =========================
SIGNUP
========================= */
document.getElementById("signupBtn").onclick = async ()=>{

errorBox.innerText="";

let name = nameInput.value.trim();
const email = emailInput.value.trim();
const password = passInput.value.trim();
const role = roleInput.value;

if(!email || !password){
errorBox.innerText="Please fill email & password";
return;
}

/* fallback name */
if(!name){
name = email.split("@")[0];
}

try{

const userCredential = await createUserWithEmailAndPassword(auth,email,password);

await setDoc(doc(db,"users",userCredential.user.uid),{
name: name,
email: email,
role: role
});

alert("Account created successfully! Please login.");

}catch(err){
errorBox.innerText = err.message;
}

};


/* =========================
LOGIN
========================= */
document.getElementById("loginBtn").onclick = async ()=>{

errorBox.innerText="";

const email = emailInput.value.trim();
const password = passInput.value.trim();

if(!email || !password){
errorBox.innerText="Enter email and password";
return;
}

try{

const userCredential = await signInWithEmailAndPassword(auth,email,password);

const userDoc = await getDoc(doc(db,"users",userCredential.user.uid));

if(!userDoc.exists()){
errorBox.innerText="User role not found";
await signOut(auth);
return;
}

const actualRole = userDoc.data().role;
const selectedRole = roleInput.value;

/* ROLE CHECK */
if(actualRole !== selectedRole){
errorBox.innerText = "Incorrect role selected";
await signOut(auth);
return;
}

/* REDIRECT */
if(actualRole === "teacher"){
window.location="attendance.html";
}else{
window.location="dashboard.html";
}

}catch(err){
errorBox.innerText = err.message;
}

};


/* =========================
FORGOT PASSWORD
========================= */
document.getElementById("forgotBtn").onclick = async ()=>{

errorBox.innerText="";

const email = emailInput.value.trim();

if(!email){
errorBox.innerText = "Enter your email first";
return;
}

try{
await sendPasswordResetEmail(auth, email);
errorBox.innerText = "Reset email sent! Check your inbox.";
}catch(err){
errorBox.innerText = err.message;
}

};

</script>

</body>
</html>
