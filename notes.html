<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudySync Notes</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

.notes-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
margin-top:30px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#1f2937;
padding:25px;
border-radius:12px;
width:320px;
display:flex;
flex-direction:column;
gap:12px;
}

.modal-content input{
padding:10px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- GLOBAL APP -->
<script type="module" src="js/app.js"></script>

<div class="main">

<h1>Professor Notes 📄</h1>

<div id="notesContainer" class="notes-grid"></div>

</div>

<!-- ADD BUTTON -->

<button id="addBtn" class="add-btn" onclick="openModal()" style="display:none">
+
</button>

<!-- MODAL -->

<div id="noteModal" class="modal">

<div class="modal-content">

<h3>Add Note</h3>

<input id="noteTitle" placeholder="Note Title">

<input id="noteLink" placeholder="Google Drive / PDF link">

<button class="btn" onclick="addNote()">Save</button>

</div>

</div>

<script>

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3
}
}
});

</script>

<script type="module">

import { db, auth } from "./js/firebase.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const container=document.getElementById("notesContainer");
const addBtn=document.getElementById("addBtn");

let role="";
let userEmail="";

/* AUTH */

onAuthStateChanged(auth, async(user)=>{

if(!user){
window.location="index.html";
return;
}

userEmail=user.email;

const userDoc=await getDoc(doc(db,"users",user.uid));

role=userDoc.data().role;

if(role==="teacher"){
addBtn.style.display="block";
}

loadNotes();

});


/* LOAD NOTES */

async function loadNotes(){

container.innerHTML="";

const snapshot=await getDocs(collection(db,"notes"));

snapshot.forEach(document=>{

const data=document.data();
const id=document.id;

container.innerHTML+=`

<div class="card">

<h3>${data.title}</h3>

<p style="opacity:0.7">
Uploaded by ${data.uploadedBy}
</p>

<button class="btn" onclick="window.open('${data.pdfURL}')">
Open
</button>

${
role==="teacher"
?
`<button class="btn" onclick="deleteNote('${id}')">Delete</button>`
:
""
}

</div>

`;

});

}


/* ADD NOTE */

window.addNote = async function(){

const title=document.getElementById("noteTitle").value;
const link=document.getElementById("noteLink").value;

if(!title || !link){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"notes"),{

title:title,
pdfURL:link,
uploadedBy:userEmail,
date:new Date().toISOString()

});

closeModal();

loadNotes();

};


/* DELETE */

window.deleteNote = async function(id){

if(confirm("Delete note?")){

await deleteDoc(doc(db,"notes",id));

loadNotes();

}

};

</script>

<script>

function openModal(){
document.getElementById("noteModal").style.display="flex";
}

function closeModal(){
document.getElementById("noteModal").style.display="none";
}

</script>

</body>
</html>
