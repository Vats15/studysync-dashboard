<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudySync Timetable</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

/* TIMETABLE CARD */

.timetable-card{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:18px;
backdrop-filter:blur(12px);
}

/* TABLE */

.timetable{
width:100%;
border-collapse:separate;
border-spacing:12px;
text-align:center;
}

.timetable th{
font-weight:600;
padding:10px;
opacity:0.9;
}

.day{
font-size:15px;
font-weight:600;
}

/* SLOT STYLE */

.slot{
padding:16px;
border-radius:14px;
font-weight:500;
transition:0.25s;
cursor:pointer;
}

.slot:hover{
transform:translateY(-4px);
box-shadow:0 8px 18px rgba(0,0,0,0.25);
}

/* SUBJECT COLORS */

.rfa{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
}

.ofc{
background:linear-gradient(135deg,#3b82f6,#22d3ee);
}

.wc{
background:linear-gradient(135deg,#14b8a6,#22d3ee);
}

.cc{
background:linear-gradient(135deg,#f59e0b,#fb923c);
}

.lab{
background:linear-gradient(135deg,#ec4899,#f472b6);
}

.lunch{
background:rgba(255,255,255,0.25);
}

</style>

</head>

<body>

<div id="particles-js"></div>


<!-- SIDEBAR -->
<div id="sidebar" class="sidebar"></div>

<!-- GLOBAL APP LOGIC -->

<script type="module" src="js/app.js"></script>

<!-- MAIN -->

<div class="main">

<h1>Weekly Timetable 📅</h1>

<div class="timetable-card">

<table class="timetable">

<tr>
<th></th>
<th>11-12</th>
<th>12-1</th>
<th>1-2</th>
<th>2-3</th>
<th>3-4</th>
<th>4-5</th>
</tr>

<tr>
<th class="day">Monday</th>
<td></td>
<td class="slot rfa">RFA</td>
<td class="slot lunch">Lunch</td>
<td class="slot ofc">OFC</td>
<td class="slot wc">WC</td>
<td class="slot cc">CC</td>
</tr>

<tr>
<th class="day">Tuesday</th>
<td class="slot ofc">OFC</td>
<td class="slot wc">WC</td>
<td class="slot lunch">Lunch</td>
<td class="slot cc">CC</td>
<td colspan="2" class="slot lab">RFA Lab</td>
</tr>

<tr>
<th class="day">Wednesday</th>
<td></td>
<td></td>
<td class="slot lunch">Lunch</td>
<td colspan="2" class="slot lab">WC Lab</td>
<td class="slot rfa">RFA</td>
</tr>

<tr>
<th class="day">Thursday</th>
<td class="slot rfa">RFA</td>
<td class="slot wc">WC</td>
<td class="slot lunch">Lunch</td>
<td class="slot cc">CC</td>
<td colspan="2" class="slot lab">CC Lab</td>
</tr>

<tr>
<th class="day">Friday</th>
<td colspan="2" class="slot lab">OFC Lab</td>
<td class="slot lunch">Lunch</td>
<td class="slot ofc">OFC</td>
<td colspan="2" class="slot lab">Project Lab</td>
</tr>

</table>

</div>

</div>

<!-- PARTICLES -->

<script>

particlesJS("particles-js",{
particles:{
number:{value:60},
size:{value:3},
move:{speed:1},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3
}
}
});

</script>


</body>
</html>
